<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed Gaber - Digital Business Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-dark: #0f1019;
            --primary-slate: #4a5b66;
            --accent-gold: #d7b291;
            --accent-warm: #a47d5f;
            --light-gray: #c7ccd5;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--primary-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(74, 91, 102, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(167, 125, 95, 0.1) 0%, transparent 50%);
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: linear-gradient(145deg, #1a1d29 0%, #0f1019 100%);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(215, 178, 145, 0.1);
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-warm), var(--accent-gold));
            background-size: 200% 100%;
            animation: shimmer 3s ease infinite;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .header {
            position: relative;
            padding: 40px 30px 20px;
            text-align: center;
        }

        .photo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .photo-ring {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-warm));
            opacity: 0.6;
        }

        .photo-ring::after {
            content: '';
            position: absolute;
            inset: 2px;
            border-radius: 50%;
            background: var(--primary-dark);
        }

        .photo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid transparent;
            position: relative;
            z-index: 1;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .name {
            font-size: 28px;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .title {
            font-size: 15px;
            font-weight: 500;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .company {
            font-size: 13px;
            font-weight: 500;
            color: var(--light-gray);
            margin-bottom: 10px;
            opacity: 0.85;
        }

        .location {
            font-size: 13px;
            color: var(--light-gray);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            opacity: 0.8;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(215, 178, 145, 0.3), transparent);
            margin: 0 30px;
        }

        .content {
            padding: 25px 30px;
        }

        .contact-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 18px;
            background: rgba(74, 91, 102, 0.12);
            border-radius: 14px;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid rgba(215, 178, 145, 0.06);
        }

        .contact-item:hover {
            background: rgba(74, 91, 102, 0.2);
            transform: translateX(4px);
            border-color: rgba(215, 178, 145, 0.2);
        }

        .contact-item:active {
            transform: translateX(4px) scale(0.98);
        }

        .icon-wrapper {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 18px;
        }

        .icon-phone { background: rgba(215, 178, 145, 0.15); color: var(--accent-gold); }
        .icon-email { background: rgba(199, 204, 213, 0.15); color: var(--light-gray); }
        .icon-linkedin { background: rgba(0, 119, 181, 0.15); color: #4aa8ff; }
        .icon-resume { background: rgba(164, 125, 95, 0.15); color: var(--accent-warm); }
        .icon-location { background: rgba(74, 91, 102, 0.2); color: var(--primary-slate); }

        .contact-info {
            flex: 1;
            min-width: 0;
        }

        .contact-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--light-gray);
            opacity: 0.6;
            margin-bottom: 2px;
        }

        .contact-value {
            font-size: 14px;
            font-weight: 500;
            color: var(--white);
            word-break: break-all;
        }

        .arrow {
            color: var(--accent-gold);
            opacity: 0.4;
            font-size: 14px;
            transition: opacity 0.3s;
        }

        .contact-item:hover .arrow {
            opacity: 1;
        }

        .footer {
            padding: 20px 30px 30px;
            text-align: center;
        }

        .save-contact-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-warm));
            color: var(--primary-dark);
            font-weight: 600;
            font-size: 15px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(215, 178, 145, 0.25);
            text-decoration: none;
        }

        .save-contact-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(215, 178, 145, 0.35);
        }

        .save-contact-btn:active {
            transform: translateY(0);
        }

        .qr-hint {
            margin-top: 16px;
            font-size: 12px;
            color: var(--light-gray);
            opacity: 0.5;
        }

        @media (max-width: 480px) {
            .card {
                border-radius: 20px;
            }
            .header {
                padding: 30px 20px 15px;
            }
            .content {
                padding: 20px;
            }
            .name {
                font-size: 24px;
            }
        }
    </style>
</head>
